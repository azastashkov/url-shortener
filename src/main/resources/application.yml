spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/urlshortener
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080

app:
  instance-id: ${APP_INSTANCE_ID:1}
  total-instances: ${APP_TOTAL_INSTANCES:3}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: url-shortener
      instance: ${APP_INSTANCE_ID:1}
